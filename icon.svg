  <path d="M230 108 Q220 72 208 52 Q225 75 245 100Z" fill="#f5c842"/>
  <path d="M248 102 Q242 62 238 40 Q252 68 262 98Z" fill="#4fc466"/>
  <path d="M264 100 Q265 58 268 36 Q275 64 274 98Z" fill="#f5c842"/>
  <path d="M278 102 Q285 62 292 42 Q290 70 285 100Z" fill="#4fc466"/>

