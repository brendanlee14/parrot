<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0f0f1a"/>

  <!-- Tail feathers -->
  <path d="M310 370 Q340 430 290 470 Q270 480 260 460 Q280 420 295 385Z" fill="#2a7a3a"/>
  <path d="M330 380 Q375 435 340 475 Q318 488 308 465 Q330 425 320 390Z" fill="#1d6b2e"/>
  <path d="M348 395 Q405 445 378 488 Q355 502 344 480 Q360 440 348 408Z" fill="#4a9a5a"/>

