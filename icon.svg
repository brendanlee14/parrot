  <circle cx="288" cy="152" r="10" fill="#1a1a2e"/>
  <!-- Eye highlight -->
  <circle cx="292" cy="148" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="284" cy="155" r="1.5" fill="white" opacity="0.5"/>

  <!-- Upper beak -->
  <path d="M305 162 Q345 155 355 170 Q345 188 310 182 Q298 178 298 170Z" fill="#e8c84a"/>
  <!-- Lower beak -->
  <path d="M308 182 Q340 178 345 190 Q335 200 310 196 Q300 192 300 186Z" fill="#c9a830"/>
  <!-- Beak nostril -->
  <ellipse cx="330" cy="163" rx="4" ry="3" fill="#b8952a" opacity="0.6"/>

