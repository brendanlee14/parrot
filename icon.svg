  <path d="M220 405 Q215 428 205 440 Q200 445 195 440" stroke="#c9a830" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M205 440 Q195 450 185 448" stroke="#c9a830" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M205 440 Q200 452 192 455" stroke="#c9a830" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M205 440 Q208 453 202 458" stroke="#c9a830" stroke-width="4" stroke-linecap="round" fill="none"/>

  <path d="M295 400 Q295 422 300 435 Q303 441 308 437" stroke="#c9a830" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M308 437 Q318 448 326 445" stroke="#c9a830" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M308 437 Q312 450 320 453" stroke="#c9a830" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M308 437 Q305 452 310 457" stroke="#c9a830" stroke-width="4" stroke-linecap="round" fill="none"/>
