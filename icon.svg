  <ellipse cx="255" cy="300" rx="100" ry="115" fill="#2e8b4a"/>

  <!-- Wing detail -->
  <path d="M175 270 Q155 310 165 355 Q195 340 220 300 Q230 280 215 265Z" fill="#1d6b2e"/>
  <path d="M178 275 Q160 308 170 348 Q192 336 215 300 Q224 282 211 268Z" fill="#3aab55"/>
